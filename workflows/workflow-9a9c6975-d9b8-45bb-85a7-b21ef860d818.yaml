id: 9a9c6975-d9b8-45bb-85a7-b21ef860d818
name: disk
description: |
  Audit what's consuming disk space under a path.

  Walks the entire tree (no depth limit to set), classifies every file by content
  type (video, audio, audiobooks, ebooks, docker, VM images, parquet, databases,
  archives, code, node_modules, etc.), and reports semantic findings — e.g.
  "3 large Docker images", "Audiobooks: 42 files, 12 GiB", "Books combined:
  100 files, 20 GiB". No need to specify depth or top-N — the extension adapts
  based on what it finds.

  Usage:
    swamp workflow run disk --input path=/
    swamp workflow run disk --input path=/home --input 'excludePatterns:json=[".git","node_modules"]'

  Then read the result:
    swamp data get --workflow disk current --json | jq -r '.content' | jq '.findings[] | .title'
tags: {}
inputs:
  properties:
    path:
      type: string
      default: ""
      description: Filesystem path to audit (required — leave empty to see help).
    excludePatterns:
      type: array
      items:
        type: string
      default: [".git", ".swamp"]
      description: Glob-style directory names to skip.
    followSymlinks:
      type: boolean
      default: false
      description: Whether to follow symbolic links when summing sizes.
    minNotableBytes:
      type: integer
      default: 1048576
      description: Minimum size in bytes for a file or dir to be considered notable (default 1 MiB).
  required: []
jobs:
  - name: main
    description: Audit disk usage under the given path.
    steps:
      - name: audit
        description: Recursively measure and classify disk usage.
        task:
          type: model_method
          modelType: "@svendowideit/disk-auditor"
          modelName: disk-auditor
          methodName: audit
          globalArgs:
            path: ${{ inputs.path }}
          inputs:
            excludePatterns: ${{ inputs.excludePatterns }}
            followSymlinks: ${{ inputs.followSymlinks }}
            minNotableBytes: ${{ inputs.minNotableBytes }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn: []
    weight: 0
version: 1